<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f766e; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 14px Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px Arial, sans-serif; fill: #475569; }
      .layer { fill: #ffffff; stroke: #0f766e; stroke-width: 2.5; rx: 18; }
      .box { fill: #f8fafc; stroke: #14b8a6; stroke-width: 2; rx: 12; }
      .box-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .box-slate { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 12; }
      .box-green { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 12; }
      .arrow { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowheadBlue); }
      .arrow-amber { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrowheadAmber); }
      .dashed { stroke-dasharray: 8 7; }
      .badge { fill: #ccfbf1; stroke: #0f766e; stroke-width: 1.5; rx: 18; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#0f766e"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arrowheadAmber" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#f8fafc"/>
  <rect x="22" y="20" width="1556" height="940" fill="#ffffff" stroke="#0f766e" stroke-width="3" stroke-dasharray="10 8" rx="24"/>

  <text x="800" y="64" text-anchor="middle" class="title">AlphaResearch Assistant - Implemented Technical Architecture</text>
  <text x="800" y="94" text-anchor="middle" class="subtitle">FastAPI + Static Web UI + OpenAI + ChromaDB + Custom Multi-Agent RAG</text>

  <rect x="60" y="125" width="1480" height="90" class="layer"/>
  <text x="90" y="158" class="box-title">1. Runtime and Configuration Boundary</text>
  <rect x="90" y="173" width="280" height="28" class="badge"/>
  <text x="230" y="192" text-anchor="middle" class="text">Python 3.10+ / Uvicorn</text>
  <rect x="410" y="173" width="280" height="28" class="badge"/>
  <text x="550" y="192" text-anchor="middle" class="text">Docker Supported</text>
  <rect x="730" y="173" width="280" height="28" class="badge"/>
  <text x="870" y="192" text-anchor="middle" class="text">.env Runtime Config</text>
  <rect x="1050" y="173" width="390" height="28" class="badge"/>
  <text x="1245" y="192" text-anchor="middle" class="text">OpenAI Key Optional: Offline Fallback Available</text>

  <rect x="60" y="245" width="1480" height="150" class="layer"/>
  <text x="90" y="278" class="box-title">2. Presentation Layer: FastAPI-Served Web App</text>
  <rect x="90" y="302" width="290" height="68" class="box"/>
  <text x="235" y="328" text-anchor="middle" class="box-title">Login Experience</text>
  <text x="235" y="350" text-anchor="middle" class="small">Demo credentials, brand lockup</text>
  <rect x="420" y="302" width="300" height="68" class="box"/>
  <text x="570" y="328" text-anchor="middle" class="box-title">Chat Interface</text>
  <text x="570" y="350" text-anchor="middle" class="small">Enter submit, Markdown rendering</text>
  <rect x="760" y="302" width="300" height="68" class="box"/>
  <text x="910" y="328" text-anchor="middle" class="box-title">SOP Cards</text>
  <text x="910" y="350" text-anchor="middle" class="small">Broking workflows as card prompts</text>
  <rect x="1100" y="302" width="340" height="68" class="box"/>
  <text x="1270" y="328" text-anchor="middle" class="box-title">Utility Actions</text>
  <text x="1270" y="350" text-anchor="middle" class="small">Upload, clear chat, rating, logout</text>

  <rect x="80" y="440" width="405" height="390" class="layer"/>
  <text x="110" y="474" class="box-title">3. Knowledge Ingestion Pipeline</text>
  <rect x="115" y="505" width="320" height="58" class="box-amber"/>
  <text x="275" y="529" text-anchor="middle" class="box-title">Knowledge Sources</text>
  <text x="275" y="549" text-anchor="middle" class="small">Markdown SOPs, guides, uploaded circulars</text>
  <rect x="115" y="600" width="320" height="58" class="box-amber"/>
  <text x="275" y="624" text-anchor="middle" class="box-title">Document Parser</text>
  <text x="275" y="644" text-anchor="middle" class="small">PDF, DOCX, XLSX, CSV, TXT, JSON, YAML</text>
  <rect x="115" y="695" width="320" height="58" class="box-amber"/>
  <text x="275" y="719" text-anchor="middle" class="box-title">Semantic Chunker</text>
  <text x="275" y="739" text-anchor="middle" class="small">Chunk size 500, overlap 100</text>
  <rect x="115" y="790" width="320" height="58" class="box-amber"/>
  <text x="275" y="814" text-anchor="middle" class="box-title">Embedding Generator</text>
  <text x="275" y="834" text-anchor="middle" class="small">OpenAI text-embedding-3-small or fallback</text>

  <path d="M275 563 L275 600" class="arrow-amber"/>
  <path d="M275 658 L275 695" class="arrow-amber"/>
  <path d="M275 753 L275 790" class="arrow-amber"/>

  <rect x="540" y="440" width="590" height="390" class="layer"/>
  <text x="570" y="474" class="box-title">4. API, Memory, and Agentic RAG Layer</text>
  <rect x="585" y="505" width="230" height="58" class="box-blue"/>
  <text x="700" y="529" text-anchor="middle" class="box-title">FastAPI Routes</text>
  <text x="700" y="549" text-anchor="middle" class="small">/api/ask, /api/search, /api/upload</text>
  <rect x="855" y="505" width="230" height="58" class="box-blue"/>
  <text x="970" y="529" text-anchor="middle" class="box-title">Conversation Memory</text>
  <text x="970" y="549" text-anchor="middle" class="small">Follow-up context and summaries</text>
  <rect x="585" y="610" width="230" height="58" class="box-blue"/>
  <text x="700" y="634" text-anchor="middle" class="box-title">Planner Agent</text>
  <text x="700" y="654" text-anchor="middle" class="small">Classifies and decomposes query</text>
  <rect x="855" y="610" width="230" height="58" class="box-blue"/>
  <text x="970" y="634" text-anchor="middle" class="box-title">Retriever Agent</text>
  <text x="970" y="654" text-anchor="middle" class="small">Searches ChromaDB for context</text>
  <rect x="585" y="715" width="230" height="58" class="box-blue"/>
  <text x="700" y="739" text-anchor="middle" class="box-title">Reasoning Agent</text>
  <text x="700" y="759" text-anchor="middle" class="small">Checks insights, gaps, confidence</text>
  <rect x="855" y="715" width="230" height="58" class="box-blue"/>
  <text x="970" y="739" text-anchor="middle" class="box-title">Response Agent</text>
  <text x="970" y="759" text-anchor="middle" class="small">Creates polished cited response</text>

  <path d="M720 563 L720 610" class="arrow-blue"/>
  <path d="M815 639 L855 639" class="arrow-blue"/>
  <path d="M970 668 C970 695 700 688 700 715" class="arrow-blue"/>
  <path d="M815 744 L855 744" class="arrow-blue"/>
  <path d="M815 534 L855 534" class="arrow-blue dashed"/>

  <rect x="1190" y="440" width="300" height="390" class="layer"/>
  <text x="1220" y="474" class="box-title">5. Models and Storage</text>
  <rect x="1230" y="505" width="220" height="68" class="box-green"/>
  <text x="1340" y="531" text-anchor="middle" class="box-title">ChromaDB</text>
  <text x="1340" y="553" text-anchor="middle" class="small">Persistent local vector store</text>
  <rect x="1230" y="620" width="220" height="68" class="box-green"/>
  <text x="1340" y="646" text-anchor="middle" class="box-title">OpenAI LLM</text>
  <text x="1340" y="668" text-anchor="middle" class="small">gpt-4o-mini response generation</text>
  <rect x="1230" y="735" width="220" height="68" class="box-green"/>
  <text x="1340" y="761" text-anchor="middle" class="box-title">Official Metadata</text>
  <text x="1340" y="783" text-anchor="middle" class="small">URL, circular no, date, exchange</text>

  <path d="M435 819 C610 870 1050 870 1230 545" class="arrow"/>
  <path d="M1085 639 C1135 639 1175 539 1230 539" class="arrow"/>
  <path d="M1085 744 C1145 744 1165 654 1230 654" class="arrow"/>
  <path d="M1230 769 C1160 790 1100 790 1085 744" class="arrow dashed"/>

  <rect x="95" y="880" width="1410" height="48" class="box-slate"/>
  <text x="800" y="908" text-anchor="middle" class="text">Primary implementation: FastAPI backend serves the frontend and exposes RAG APIs. Documents are chunked, embedded, stored in ChromaDB, retrieved by semantic search, and answered through OpenAI-backed agent orchestration.</text>
</svg>
